<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiTumbuh - Aplikasi Simulasi Tumbuh Kembang</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f9fafb; color: #1f2937; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; max-width: 400px; width: 100%; margin-top: 40px; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #f3f4f6; box-sizing: border-box; }
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .logo { font-size: 30px; }
        .title { font-size: 24px; font-weight: bold; color: #111827; margin: 0; }
        .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 24px; line-height: 1.4; }
        .form-group { margin-bottom: 16px; }
        .label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #374151; }
        .input, .select { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
        .input:focus, .select:focus { outline: none; border-color: #16a34a; }
        .btn { width: 100%; padding: 12px; background-color: #16a34a; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 8px; }
        .btn:hover { background-color: #15803d; }
        .result { margin-top: 24px; padding: 16px; border-radius: 8px; border: 1px solid #d1d5db; display: none; }
        .res-title { font-weight: bold; font-size: 14px; text-transform: uppercase; margin: 0 0 4px 0; }
        .res-status { font-size: 18px; font-weight: 800; margin: 0 0 8px 0; }
        .res-detail { font-size: 13px; margin: 0; opacity: 0.9; }
        .normal { color: #16a34a; background-color: #f0fdf4; border-color: #bbf7d0; }
        .stunted { color: #ea580c; background-color: #fff7ed; border-color: #ffedd5; }
        .severe { color: #b91c1c; background-color: #fef2f2; border-color: #fee2e2; }
        .tinggi { color: #2563eb; background-color: #eff6ff; border-color: #dbeafe; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <span class="logo">🌱</span>
            <h1 class="title">SiTumbuh</h1>
        </div>
        <p class="subtitle">Simulasi Pengukuran Kategori Tinggi Badan Menurut Umur (0-24 Bulan)</p>
        
        <div class="form-group">
            <label class="label">Nama Balita</label>
            <input type="text" id="nama" class="input" placeholder="Masukkan nama balita">
        </div>

        <div class="form-group">
            <label class="label">Usia Pengukuran</label>
            <select id="usia" class="select">
                <option value="0">0 Bulan</option>
                <option value="3">3 Bulan</option>
                <option value="6">6 Bulan</option>
                <option value="9">9 Bulan</option>
                <option value="12">12 Bulan</option>
                <option value="15">15 Bulan</option>
                <option value="18">18 Bulan</option>
                <option value="21">21 Bulan</option>
                <option value="24">24 Bulan</option>
            </select>
        </div>

        <div class="form-group">
            <label class="label">Tinggi Badan (cm)</label>
            <input type="number" step="0.1" id="tinggi" class="input" placeholder="Contoh: 65.5">
        </div>

        <button class="btn" onclick="prosesAnalisis()">Analisis Status Tumbuh</button>

        <div id="box-hasil" class="result">
            <p id="hasil-nama" class="res-title"></p>
            <p id="hasil-status" class="res-status"></p>
            <p id="hasil-detail" class="res-detail"></p>
        </div>
    </div>

    <script>
        const WHO_STANDARDS = {
            0: { sd3neg: 44.2, sd2neg: 46.1, median: 49.9, sd2pos: 53.7, sd3pos: 55.6 },
            3: { sd3neg: 57.3, sd2neg: 59.4, median: 61.4, sd2pos: 63.5, sd3pos: 65.6 },
            6: { sd3neg: 63.3, sd2neg: 65.5, median: 67.8, sd2pos: 69.8, sd3pos: 71.9 },
            9: { sd3neg: 67.5, sd2neg: 69.7, median: 72.0, sd2pos: 74.2, sd3pos: 76.5 },
            12: { sd3neg: 71.0, sd2neg: 73.4, median: 75.7, sd2pos: 78.1, sd3pos: 80.5 },
            15: { sd3neg: 74.1, sd2neg: 76.6, median: 79.1, sd2pos: 81.6, sd3pos: 84.1 },
            18: { sd3neg: 76.9, sd2neg: 79.6, median: 82.3, sd2pos: 85.0, sd3pos: 87.7 },
            21: { sd3neg: 79.4, sd2neg: 82.3, median: 85.1, sd2pos: 88.0, sd3pos: 90.9 },
            24: { sd3neg: 81.7, sd2neg: 84.8, median: 87.8, sd2pos: 90.9, sd3pos: 93.9 }
        };

        function prosesAnalisis() {
            const namaInput = document.getElementById('nama').value || 'Balita';
            const usiaInput = parseInt(document.getElementById('usia').value);
            const tinggiInput = parseFloat(document.getElementById('tinggi').value);
            
            if (!tinggiInput) {
                alert('Mohon masukkan angka tinggi badan terlebih dahulu!');
                return;
            }

            const standar = WHO_STANDARDS[usiaInput];
            let status = "Normal";
            let kelasWarna = "normal";

            if (tinggiInput < standar.sd3neg) {
                status = "Sangat Pendek (Severely Stunted)";
                kelasWarna = "severe";
            } else if (tinggiInput < standar.sd2neg) {
                status = "Pendek (Stunted)";
                kelasWarna = "stunted";
            } else if (tinggiInput > standar.sd2pos) {
                status = "Tinggi";
                kelasWarna = "tinggi";
            }

            const boxHasil = document.getElementById('box-hasil');
            boxHasil.className = "result " + kelasWarna;
            boxHasil.style.display = "block";
            
            document.getElementById('hasil-nama').innerText = "Hasil Analisis " + namaInput + ":";
            document.getElementById('hasil-status').innerText = status;
            document.getElementById('hasil-detail').innerText = "Tinggi Badan: " + tinggiInput + " cm | Standar Median WHO: " + standar.median + " cm";
        }
    </script>
</body>
</html>
