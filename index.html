<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SiTumbuh</title>
    <!-- Library Pembaca Aplikasi Standar -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://tailwindcss.com"></script>
  </head>
  <body>
    <div id="root"></div>

    <!-- Script otomatis untuk membaca dan merakit file App.jsx Anda -->
    <script type="text/babel">
      async function luncurkanAplikasi() {
        try {
          const respon = await fetch('./App.jsx');
          const teksKode = await respon.text();
          
          // Membersihkan kode impor lokal agar tidak diblokir browser laptop
          const kodeBersih = teksKode
            .replace(/import\s+[\s\S]*?from\s+['"].*?['"];?/g, '')
            .replace(/export\s+default\s+/g, '');

          const kodeTerjemahan = Babel.transform(kodeBersih, { presets: ['react'] }).code;
          const KomponenApp = new Function('React', 'useState', 'useMemo', `${kodeTerjemahan}; return App;`)(React, React.useState, React.useMemo);
          
          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(React.createElement(KomponenApp));
        } catch (error) {
          console.error("Gagal memuat aplikasi:", error);
        }
      }
      luncurkanAplikasi();
    </script>
  </body>
</html>
