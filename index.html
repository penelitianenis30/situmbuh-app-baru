<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SiTumbuh</title>
    <script src="https://unpkg.com" crossorigin></script>
    <script src="https://unpkg.com" crossorigin></script>
    <script src="https://unpkg.com"></script>
    <script src="https://tailwindcss.com"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      // Pemicu otomatis untuk mengambil kode dari App.jsx
      window.addEventListener('DOMContentLoaded', async () => {
        try {
          const r = await fetch('./App.jsx');
          const t = await r.text();
          const clean = t.replace(/import[\s\S]*?from.*/g, '').replace(/export\s+default\s+/g, '');
          const compiled = Babel.transform(clean, { presets: ['react'] }).code;
          const Factory = new Function('React', 'useState', 'useMemo', `${compiled}; return App;`);
          const AppComp = Factory(React, React.useState, React.useMemo);
          ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(AppComp));
        } catch (e) { console.error(e); }
      });
    </script>
  </body>
</html>
